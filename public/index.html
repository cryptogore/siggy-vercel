<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Siggy Dormitory</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
overflow:hidden;
position:relative;
}

/* ritual animated background */

body::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background-image:url("ritual-symbol.png");
background-size:120px;
background-repeat:repeat;
opacity:0.05;
animation:bgMove 60s linear infinite;
}

@keyframes bgMove{
from{transform:translate(0,0)}
to{transform:translate(-120px,-120px)}
}

.container{
position:relative;
width:900px;
margin:auto;
top:50%;
transform:translateY(-50%);
}

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.logo{
width:55px;
filter:drop-shadow(0 0 8px #ef4444);
}

.title{
font-size:28px;
font-weight:bold;
}

.chat-box{
background:rgba(15,23,42,0.7);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:20px;
height:600px;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow-y:auto;
padding-right:10px;
}

.message{
display:flex;
gap:10px;
margin:12px 0;
align-items:flex-end;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.bubble{
max-width:65%;
padding:12px 16px;
border-radius:18px;
line-height:1.5;
font-size:14px;
}

/* user bubble */

.user .bubble{
background:rgba(0,0,0,0.25);
border:1px solid #22c55e;
box-shadow:0 0 10px rgba(34,197,94,0.4);
}

/* AI bubble */

.bot .bubble{
background:#111827;
box-shadow:0 0 12px rgba(239,68,68,0.25);
}

.input-area{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:14px;
border-radius:12px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:14px 22px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
}

button:hover{
background:#dc2626;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<img src="/ritual-logo.png" class="logo">

<div class="title">Siggy Dormitory</div>

</div>

<div class="chat-box">

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

<script>

const messages=document.getElementById("messages")

function addMessage(text,type){

let div=document.createElement("div")

div.className=`message ${type}`

let avatar = type==="bot"
? "/ai-avatar.png"
: "/user-avatar.png"

let html=marked.parse(text)

if(type==="user"){

div.innerHTML=`
<div class="bubble">${html}</div>
<img src="${avatar}" class="avatar">
`

}else{

div.innerHTML=`
<img src="${avatar}" class="avatar">
<div class="bubble">${html}</div>
`

}

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

return div

}

async function sendMessage(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

let res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
})

let data=await res.json()

addMessage(data.response,"bot")

}

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage()
}

})

</script>

</body>

</html>
