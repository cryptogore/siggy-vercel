<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy Dormitory</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#020617;color:white;height:100vh;display:flex;overflow:hidden}
.sidebar{width:260px;background:#020617;border-right:1px solid rgba(255,255,255,.05);padding:15px;display:flex;flex-direction:column}
.newchat{background:#111827;padding:10px;border-radius:8px;cursor:pointer;margin-bottom:10px;text-align:center}
.history{flex:1;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;padding:10px;border-radius:8px;cursor:pointer}
.history-item:hover{background:#111827}
.main{flex:1;display:flex;flex-direction:column}
.header{padding:15px;border-bottom:1px solid rgba(255,255,255,.05)}
.messages{flex:1;overflow-y:auto;padding:20px}
.message{display:flex;gap:10px;margin:10px 0}
.user{justify-content:flex-end}
.bot{justify-content:flex-start}
.avatar{width:32px;height:32px;border-radius:50%}
.bubble{max-width:65%;padding:12px;border-radius:14px;font-size:14px}
.user .bubble{background:rgba(0,0,0,.25);border:1px solid #22c55e}
.bot .bubble{background:#111827}
.input-area{display:flex;gap:10px;padding:15px;border-top:1px solid rgba(255,255,255,.05)}
input{flex:1;padding:12px;border-radius:8px;border:none;background:#1e293b;color:white}
button{padding:12px 20px;border:none;border-radius:8px;background:#ef4444;color:white;cursor:pointer}
</style>
</head>
<body>
<div class="sidebar">
<div class="newchat" id="newChatBtn">+ New Chat</div>
<div id="history" class="history"></div>
</div>
<div class="main">
<div class="header">🐱 Siggy · Mystical Oracle Cat</div>
<div id="messages" class="messages"></div>
<div class="input-area">
<input id="msg" placeholder="Ask Siggy something...">
<button id="sendBtn">Send</button>
</div>
</div>
<script>
let sessions = JSON.parse(localStorage.getItem('siggy_sessions')||'[]')
let currentSession = null
const messages = document.getElementById('messages')
const historyDiv = document.getElementById('history')

function save(){
 localStorage.setItem('siggy_sessions',JSON.stringify(sessions))
}

function renderSidebar(){
 historyDiv.innerHTML=''
 sessions.forEach(chat=>{
  const div=document.createElement('div')
  div.className='history-item'
  div.dataset.id=chat.id
  div.innerHTML=`<span>${chat.title}</span><span>⋯</span>`
  div.addEventListener('click',()=>loadSession(chat.id))
  historyDiv.appendChild(div)
 })
}

function newChat(){
 const chat={id:'chat_'+Date.now(),title:'New Chat',messages:[]}
 sessions.push(chat)
 currentSession=chat.id
 save()
 renderSidebar()
 loadSession(chat.id)
 addMessage(randomGreeting(),'bot')
}

function loadSession(id){
 currentSession=id
 messages.innerHTML=''
 const chat=sessions.find(c=>c.id===id)
 if(!chat)return
 chat.messages.forEach(m=>addMessage(m.text,m.type,false))
}

function addMessage(text,type,saveMsg=true){
 const div=document.createElement('div')
 div.className=`message ${type}`
 div.innerHTML=type==='user'
  ? `<div class="bubble">${text}</div><img src="./user-avatar.png" class="avatar">`
  : `<img src="./ai-avatar.png" class="avatar"><div class="bubble">${marked.parse(text)}</div>`
 messages.appendChild(div)
 messages.scrollTop=messages.scrollHeight
 if(saveMsg){
  const chat=sessions.find(c=>c.id===currentSession)
  if(chat){
   chat.messages.push({text,type})
   if(chat.messages.length===1) chat.title=text.substring(0,30)
   save()
   renderSidebar()
  }
 }
}

async function sendMessage(){
 const input=document.getElementById('msg')
 const text=input.value.trim()
 if(!text)return
 addMessage(text,'user')
 input.value=''
 try{
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})})
  const data=await res.json()
  addMessage(data.response||'Siggy is thinking...','bot')
 }catch{
  addMessage('⚠ Siggy cannot reach the oracle server.','bot')
 }
}

function randomGreeting(){
 const g=[
 'yo traveler 👋 I\'m Siggy.',
 'psst... hey explorer 🐾',
 'welcome wanderer ✨',
 'Siggy online 😼 what\'s up?',
 'hey there human 👋'
 ]
 return g[Math.floor(Math.random()*g.length)]
}

document.getElementById('newChatBtn').onclick=newChat

document.getElementById('sendBtn').onclick=sendMessage

document.getElementById('msg').addEventListener('keydown',e=>{
 if(e.key==='Enter'){e.preventDefault();sendMessage()}
})

// init
renderSidebar()
if(sessions.length===0)newChat();else loadSession(sessions[sessions.length-1].id)
</script>
</body>
</html>
