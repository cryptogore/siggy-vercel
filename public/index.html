<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Dormitory</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* ===== BACKGROUND ===== */

.bg{
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background-image:url("./ritual-symbol.png");
background-size:120px;
opacity:0.05;
animation:bgMove 60s linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes bgMove{
from{transform:translate(0,0)}
to{transform:translate(-120px,-120px)}
}

/* ===== SIDEBAR ===== */

.sidebar{
width:250px;
background:rgba(2,6,23,0.9);
border-right:1px solid rgba(255,255,255,0.05);
padding:20px;
display:flex;
flex-direction:column;
z-index:2;
}

.sidebar h2{
margin:0 0 20px 0;
}

.history{
flex:1;
overflow-y:auto;
}

.history-item{
padding:10px;
border-radius:8px;
font-size:14px;
opacity:0.8;
cursor:pointer;
}

.history-item:hover{
background:rgba(255,255,255,0.05);
}

/* ===== MAIN ===== */

.main{
flex:1;
display:flex;
flex-direction:column;
z-index:2;
}

/* ===== HEADER ===== */

.header{
display:flex;
align-items:center;
gap:10px;
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
width:40px;
}

.title{
font-weight:bold;
}

/* ===== CHAT ===== */

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
display:flex;
gap:10px;
margin:12px 0;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.avatar{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

/* ===== BUBBLE ===== */

.bubble{
max-width:65%;
padding:12px 16px;
border-radius:16px;
font-size:14px;
line-height:1.5;
}

.user .bubble{
background:rgba(0,0,0,0.25);
border:1px solid #22c55e;
box-shadow:0 0 10px rgba(34,197,94,0.4);
}

.bot .bubble{
background:#111827;
box-shadow:0 0 10px rgba(239,68,68,0.3);
}

/* ===== INPUT ===== */

.input-area{
display:flex;
gap:10px;
padding:16px;
border-top:1px solid rgba(255,255,255,0.05);
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* ===== THINKING DOTS ===== */

.thinking{
display:flex;
gap:6px;
}

.dot{
width:6px;
height:6px;
background:#ef4444;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

/* ===== SCROLLBAR ===== */

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.15);
border-radius:10px;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

.sidebar{
display:none;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="sidebar">

<h2>Chats</h2>

<div id="history" class="history"></div>

</div>

<div class="main">

<div class="header">

<img src="./ritual-logo.png" class="logo">

<div class="title">Siggy · Mystical Oracle Cat</div>

</div>

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")

function addMessage(text,type){

let div=document.createElement("div")
div.className=`message ${type}`

let avatar=type==="bot"
? "./ai-avatar.png"
: "./user-avatar.png"

let html=marked.parse(text)

if(type==="user"){

div.innerHTML=`
<div class="bubble">${html}</div>
<img src="${avatar}" class="avatar">
`

}else{

div.innerHTML=`
<img src="${avatar}" class="avatar">
<div class="bubble">${html}</div>
`

}

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

}

function showThinking(){

let div=document.createElement("div")
div.className="message bot"

div.innerHTML=`
<img src="./ai-avatar.png" class="avatar">
<div class="bubble">
<div class="thinking">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`

messages.appendChild(div)

return div

}

function addHistory(text){

let item=document.createElement("div")
item.className="history-item"
item.innerText=text.substring(0,40)

historyDiv.prepend(item)

}

async function sendMessage(){

let input=document.getElementById("msg")
let text=input.value.trim()

if(!text) return

addMessage(text,"user")
addHistory(text)

input.value=""

let thinking=showThinking()

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

thinking.remove()

addMessage(data.response,"bot")

}

document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

/* ===== GREETING ===== */

function greeting(){

const greetings=[

`yo traveler 👋  

I'm **Siggy**, the mystical oracle cat of Ritual.  

been wandering the network all night looking for secrets ✨  

ask me anything.`,

`hey there 👀  

I'm **Siggy** — oracle cat, Ritual guide, and collector of strange knowledge.  

what are you curious about today? 🐾`,

`welcome wanderer 🐱  

you've found **Siggy**, the oracle cat of the Ritual realm.  

ask a question and let's explore.`

]

addMessage(
greetings[Math.floor(Math.random()*greetings.length)],
"bot"
)

}

window.onload=greeting

</script>

</body>
</html>
