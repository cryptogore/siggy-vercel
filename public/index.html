<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Dormitory</title>
<link rel="icon" type="image/png" href="./ritual-symbol.png">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);

background-size:60px 60px;
animation:gridMove 20s linear infinite;
z-index:-5;
}

@keyframes gridMove{
0%{background-position:0 0}
100%{background-position:60px 60px}
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid rgba(255,255,255,0.05);
padding:15px;
display:flex;
flex-direction:column;
z-index:10;
}

.newchat{
background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center;
}

.history{
flex:1;
overflow-y:auto;
}

.history-item{
display:flex;
justify-content:space-between;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.history-item:hover{
background:#111827;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
position:relative;
}

/* WEBGL CANVAS */

#ritual3d{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* HEADER */

.header{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);
z-index:5;
}

/* CHAT */

.messages{
flex:1;
overflow-y:auto;
padding:20px;
z-index:5;
}

.message{
display:flex;
gap:10px;
margin:10px 0;
}

.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.avatar{
width:32px;
height:32px;
border-radius:50%;
}

.bubble{
max-width:65%;
padding:12px;
border-radius:14px;
font-size:14px;
}

.user .bubble{
background:rgba(0,0,0,0.25);
border:1px solid #22c55e;
}

.bot .bubble{
background:#111827;
}

/* INPUT */

.input-area{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.05);
z-index:5;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>
<div id="history" class="history"></div>

</div>

<div class="main">

<canvas id="ritual3d"></canvas>

<div class="header">
🐱 Siggy · Mystical Oracle Cat
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="msg" placeholder="Ask Siggy something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

/* THREEJS SETUP */

const canvas=document.getElementById("ritual3d")

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=5

const renderer=new THREE.WebGLRenderer({
canvas,
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

/* SYMBOL */

const loader=new THREE.TextureLoader()

loader.load("./ritual-symbol.png",(texture)=>{

const img=texture.image
const ratio=img.width/img.height

const geometry=new THREE.PlaneGeometry(3*ratio,3)

const material=new THREE.MeshBasicMaterial({
map:texture,
transparent:true
})

const symbol=new THREE.Mesh(geometry,material)

scene.add(symbol)

/* NEON AURA */

const auraGeometry=new THREE.RingGeometry(2.2,2.6,64)

const auraMaterial=new THREE.MeshBasicMaterial({
color:0x00ff88,
transparent:true,
opacity:0.35,
side:THREE.DoubleSide
})

const aura=new THREE.Mesh(auraGeometry,auraMaterial)

aura.rotation.x=Math.PI/2

scene.add(aura)

/* PARTICLE VORTEX */

const particles=[]

const particleGeometry=new THREE.SphereGeometry(0.03,8,8)
const particleMaterial=new THREE.MeshBasicMaterial({color:0x00ff88})

for(let i=0;i<120;i++){

let p=new THREE.Mesh(particleGeometry,particleMaterial)

let angle=Math.random()*Math.PI*2
let radius=2+Math.random()*0.5

p.userData={angle,radius}

scene.add(p)
particles.push(p)

}

/* LIGHT */

const light=new THREE.PointLight(0x00ff88,2,10)
light.position.set(0,0,3)

scene.add(light)

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

symbol.rotation.y+=0.003
symbol.rotation.x+=0.001

aura.rotation.z+=0.002

particles.forEach(p=>{

p.userData.angle+=0.01

p.position.x=Math.cos(p.userData.angle)*p.userData.radius
p.position.y=Math.sin(p.userData.angle)*p.userData.radius
p.position.z=Math.sin(p.userData.angle*2)*0.5

})

renderer.render(scene,camera)

}

animate()

})

/* RESIZE */

window.addEventListener("resize",()=>{

renderer.setSize(window.innerWidth,window.innerHeight)

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

})

/* CHAT SYSTEM */

const messages=document.getElementById("messages")

function addMessage(text,type){

let div=document.createElement("div")

div.className=`message ${type}`

div.innerHTML=type==="user"
? `<div class="bubble">${text}</div>
<img src="./user-avatar.png" class="avatar">`
: `<img src="./ai-avatar.png" class="avatar">
<div class="bubble">${marked.parse(text)}</div>`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

async function sendMessage(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

addMessage(data.response || "Siggy is thinking...","bot")

}

document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault()
sendMessage()
}
})

/* GREETING */

addMessage("welcome wanderer ✨","bot")

</script>

</body>
</html>
