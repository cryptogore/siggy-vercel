<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="./ritual-symbol.png">
<title>Siggy Dormitory</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* GRID */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
background-size:60px 60px;
animation:gridMove 20s linear infinite;
z-index:-5;
}

@keyframes gridMove{
0%{background-position:0 0}
100%{background-position:60px 60px}
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid rgba(255,255,255,0.05);
padding:15px;
display:flex;
flex-direction:column;
z-index:5;
}

.newchat{
background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center;
}

.history{
flex:1;
overflow-y:auto;
}

.history-item{
display:flex;
justify-content:space-between;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.history-item:hover{
background:#111827;
}

.menu-btn{
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
position:relative;
}

/* WEBGL CANVAS */

#ritual3d{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* HEADER */

.header{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);
z-index:3;
}

/* CHAT */

.messages{
flex:1;
overflow-y:auto;
padding:20px;
z-index:3;
}

.message{
display:flex;
gap:10px;
margin:10px 0;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
}

.bubble{
max-width:65%;
padding:12px;
border-radius:14px;
font-size:14px;
}

.user .bubble{
background:rgba(0,0,0,0.25);
border:1px solid #22c55e;
}

.bot .bubble{
background:#111827;
}

/* INPUT */

.input-area{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.05);
z-index:3;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* THINKING */

.thinking{
display:flex;
gap:6px;
}

.dot{
width:6px;
height:6px;
background:#ef4444;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

</style>

</head>

<body>

<div class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>
<div id="history" class="history"></div>

</div>

<div class="main">

<canvas id="ritual3d"></canvas>

<div class="header">
🐱 Siggy · Mystical Oracle Cat
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="msg" placeholder="Ask Siggy something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

/* THREEJS RITUAL SYMBOL */

const canvas=document.getElementById("ritual3d")

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000)
camera.position.z=5

const renderer=new THREE.WebGLRenderer({canvas,alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)

/* TEXTURE */

const texture=new THREE.TextureLoader().load("./ritual-symbol.png")

const geometry=new THREE.PlaneGeometry(3,3)

const material=new THREE.MeshBasicMaterial({
map:texture,
transparent:true
})

const symbol=new THREE.Mesh(geometry,material)

scene.add(symbol)

/* NEON GLOW */

const glowMaterial=new THREE.SpriteMaterial({
map:texture,
color:0x00ff88,
transparent:true,
opacity:0.25
})

const glow=new THREE.Sprite(glowMaterial)
glow.scale.set(4.5,4.5,1)

scene.add(glow)

/* LIGHT */

const light=new THREE.PointLight(0x00ff88,2,10)
light.position.set(0,0,3)

scene.add(light)

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

symbol.rotation.y+=0.003
symbol.rotation.x+=0.001

glow.rotation+=0.002

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

renderer.setSize(window.innerWidth,window.innerHeight)
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

})

/* RANDOM GREETINGS */

const greetings=[
"yo traveler 👋 I'm Siggy — mystical oracle cat.",
"psst... hey explorer 🐾",
"welcome wanderer ✨",
"well well... another curious mind appears 🔮",
"Siggy online 😼 what's the vibe today?"
]

function randomGreeting(){
return greetings[Math.floor(Math.random()*greetings.length)]
}

/* STORAGE */

let sessions=JSON.parse(localStorage.getItem("siggy_sessions"))||[]
let currentSession=null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")

function save(){
localStorage.setItem("siggy_sessions",JSON.stringify(sessions))
}

/* SIDEBAR */

function renderSidebar(){

historyDiv.innerHTML=""

sessions.forEach(chat=>{

let div=document.createElement("div")
div.className="history-item"

div.innerHTML=`<span>${chat.title}</span><span class="menu-btn">⋯</span>`

div.querySelector("span").onclick=()=>loadSession(chat.id)

historyDiv.appendChild(div)

})

}

/* CHAT */

function addMessage(text,type){

let div=document.createElement("div")
div.className=`message ${type}`

div.innerHTML=type==="user"
? `<div class="bubble">${text}</div><img src="./user-avatar.png" class="avatar">`
: `<img src="./ai-avatar.png" class="avatar"><div class="bubble">${marked.parse(text)}</div>`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

/* STREAM */

function streamText(text){

let bubble=document.createElement("div")
bubble.className="bubble"

let container=document.createElement("div")
container.className="message bot"

container.innerHTML=`<img src="./ai-avatar.png" class="avatar">`
container.appendChild(bubble)

messages.appendChild(container)

let i=0

let interval=setInterval(()=>{

bubble.innerHTML=marked.parse(text.substring(0,i))

messages.scrollTop=messages.scrollHeight

i++

if(i>text.length){
clearInterval(interval)
}

},15)

}

/* SEND */

async function sendMessage(){

let input=document.getElementById("msg")
let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

streamText(data.response || "Siggy is thinking...")

}

document.getElementById("msg").addEventListener("keydown",(e)=>{

if(e.key==="Enter"){
e.preventDefault()
sendMessage()
}

})

/* INIT */

document.addEventListener("DOMContentLoaded",()=>{

renderSidebar()

addMessage(randomGreeting(),"bot")

})

</script>

</body>
</html>
