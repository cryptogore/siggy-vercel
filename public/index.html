<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Siggy Dormitory</title>
<link rel="icon" type="image/png" href="./ritual-symbol.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* circuit background */

body::before{

content:"";

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);

background-size:60px 60px;

animation:gridMove 20s linear infinite;

z-index:-3;

}

@keyframes gridMove{
0%{background-position:0 0}
100%{background-position:60px 60px}
}

/* ritual symbol */

body::after{

content:"";

position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;

background-image:url("./ritual-symbol.png");
background-size:120px;
background-repeat:repeat;

opacity:0.05;

animation:symbolMove 80s linear infinite;

z-index:-2;

}

@keyframes symbolMove{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

/* sidebar */

.sidebar{

width:260px;
background:#020617;
border-right:1px solid rgba(255,255,255,0.05);

display:flex;
flex-direction:column;

padding:15px;

}

.newchat{

background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center;

}

.history{

flex:1;
overflow-y:auto;

}

.history-item{

padding:10px;
border-radius:8px;
cursor:pointer;

}

.history-item:hover{
background:#111827;
}

/* mobile drawer */

@media(max-width:900px){

.sidebar{

position:fixed;
left:-260px;
top:0;
height:100%;
transition:.3s;

}

.sidebar.open{
left:0;
}

}

/* main */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* header */

.header{

padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
align-items:center;
gap:10px;

}

.menu-btn{
cursor:pointer;
font-size:20px;
}

/* chat */

.messages{

flex:1;
overflow-y:auto;
padding:20px;

}

.message{

display:flex;
gap:10px;
margin:10px 0;

}

.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.avatar{

width:34px;
height:34px;
border-radius:50%;

}

.bubble{

max-width:65%;
padding:12px;
border-radius:14px;
font-size:14px;

}

.user .bubble{

background:rgba(0,0,0,0.25);
border:1px solid #22c55e;

}

.bot .bubble{

background:#111827;

}

/* input */

.input-area{

display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.05);

}

input{

flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;

}

button{

padding:12px 20px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;

}

/* thinking */

.thinking{
display:flex;
gap:6px;
}

.dot{
width:6px;
height:6px;
background:#ef4444;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

/* context menu */

.context-menu{

position:fixed;
background:#111827;
border-radius:8px;
display:none;
flex-direction:column;

}

.context-menu div{

padding:8px 12px;
cursor:pointer;

}

.context-menu div:hover{

background:#1f2937;

}

</style>

</head>

<body>

<div id="sidebar" class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div id="history" class="history"></div>

</div>

<div class="main">

<div class="header">

<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<strong>🐱 Siggy · Mystical Oracle Cat</strong>

</div>

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<div id="menu" class="context-menu"></div>

<script>

/* storage */

let sessions=JSON.parse(localStorage.getItem("siggy_sessions"))||[]

let currentSession=null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")

function save(){
localStorage.setItem("siggy_sessions",JSON.stringify(sessions))
}

/* sidebar toggle */

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("open")

}

/* sidebar render */

function renderSidebar(){

historyDiv.innerHTML=""

sessions
.filter(c=>!c.archived)
.sort((a,b)=>b.pinned-a.pinned)

.forEach(chat=>{

let div=document.createElement("div")

div.className="history-item"

div.innerText=(chat.pinned?"📌 ":"")+chat.title

div.onclick=()=>loadSession(chat.id)

div.oncontextmenu=(e)=>{

e.preventDefault()

showMenu(e,chat.id)

}

historyDiv.appendChild(div)

})

}

/* new chat */

function newChat(){

const chat={
id:"chat_"+Date.now(),
title:"New Chat",
messages:[],
pinned:false,
archived:false
}

sessions.push(chat)

currentSession=chat.id

save()

renderSidebar()

messages.innerHTML=""

greeting()

}

/* load chat */

function loadSession(id){

currentSession=id

messages.innerHTML=""

let chat=sessions.find(c=>c.id===id)

chat.messages.forEach(m=>{
addMessage(m.text,m.type,false)
})

}

/* add message */

function addMessage(text,type,saveMsg=true){

let div=document.createElement("div")

div.className=`message ${type}`

let html=marked.parse(text)

div.innerHTML=type==="user"
?`<div class="bubble">${html}</div>
<img src="./user-avatar.png" class="avatar">`
:`<img src="./ai-avatar.png" class="avatar">
<div class="bubble">${html}</div>`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

if(saveMsg){

let chat=sessions.find(c=>c.id===currentSession)

chat.messages.push({text,type})

if(chat.messages.length===1){
chat.title=text.substring(0,30)
}

save()

}

}

/* streaming response */

function streamResponse(text){

let div=document.createElement("div")

div.className="message bot"

div.innerHTML=`
<img src="./ai-avatar.png" class="avatar">
<div class="bubble"></div>
`

messages.appendChild(div)

let bubble=div.querySelector(".bubble")

let i=0

let interval=setInterval(()=>{

bubble.innerHTML=marked.parse(text.substring(0,i))

i++

if(i>text.length){
clearInterval(interval)
}

messages.scrollTop=messages.scrollHeight

},15)

}

/* send */

async function sendMessage(){

let input=document.getElementById("msg")
let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

let think=showThinking()

try{

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

think.remove()

streamResponse(data.response)

}catch{

think.remove()

addMessage("⚠ Siggy cannot reach the oracle server.","bot")

}

}

document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault()
sendMessage()
}
})

/* thinking */

function showThinking(){

let div=document.createElement("div")

div.className="message bot"

div.innerHTML=`
<img src="./ai-avatar.png" class="avatar">
<div class="bubble">
<div class="thinking">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`

messages.appendChild(div)

return div

}

/* greeting */

function greeting(){

addMessage(`yo traveler 👋  

I'm **Siggy**, the mystical oracle cat of Ritual.

ask me anything.`,"bot")

}

/* context menu */

function showMenu(e,id){

let menu=document.getElementById("menu")

menu.style.display="flex"

menu.style.left=e.pageX+"px"
menu.style.top=e.pageY+"px"

menu.innerHTML=`

<div onclick="renameChat('${id}')">Rename</div>
<div onclick="pinChat('${id}')">Pin</div>
<div onclick="archiveChat('${id}')">Archive</div>
<div onclick="deleteChat('${id}')">Delete</div>

`

}

/* menu actions */

function renameChat(id){

let name=prompt("New chat name")

if(!name)return

sessions.find(c=>c.id===id).title=name

save()

renderSidebar()

}

function pinChat(id){

let chat=sessions.find(c=>c.id===id)

chat.pinned=!chat.pinned

save()

renderSidebar()

}

function archiveChat(id){

sessions.find(c=>c.id===id).archived=true

save()

renderSidebar()

}

function deleteChat(id){

sessions=sessions.filter(c=>c.id!==id)

save()

renderSidebar()

}

/* close menu */

document.body.onclick=()=>{
document.getElementById("menu").style.display="none"
}

/* load */

document.addEventListener("DOMContentLoaded",()=>{

renderSidebar()

if(sessions.length===0){
newChat()
}else{
loadSession(sessions[sessions.length-1].id)
}

})

</script>

</body>
</html>
