<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Dormitory</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* AI CIRCUIT BACKGROUND */

body::before{

content:"";

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);

background-size:60px 60px;

animation:circuitMove 20s linear infinite;

z-index:-3;

}

@keyframes circuitMove{

0%{background-position:0 0}
100%{background-position:60px 60px}

}

/* RITUAL SYMBOL LAYER */

body::after{

content:"";

position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;

background-image:url("./ritual-symbol.png");
background-size:120px;
background-repeat:repeat;

opacity:0.05;

animation:symbolMove 80s linear infinite;

z-index:-2;

}

@keyframes symbolMove{

0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}

}

/* GLOW PARTICLES */

.particles{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;

}

.particles span{

position:absolute;
width:3px;
height:3px;
background:#00ffff;
border-radius:50%;
opacity:.4;

animation:particleFloat 12s linear infinite;

}

@keyframes particleFloat{

0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}

}

/* SIDEBAR */

.sidebar{

width:260px;
background:#020617;
border-right:1px solid rgba(255,255,255,0.05);

padding:15px;
display:flex;
flex-direction:column;

}

.newchat{

background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
text-align:center;
margin-bottom:10px;

}

.history{

flex:1;
overflow-y:auto;

}

.history-item{

padding:10px;
border-radius:8px;
cursor:pointer;

}

.history-item:hover{

background:#111827;

}

/* MAIN */

.main{

flex:1;
display:flex;
flex-direction:column;

}

.header{

padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);

}

/* CHAT */

.messages{

flex:1;
overflow-y:auto;
padding:20px;

}

.message{

display:flex;
gap:10px;
margin:10px 0;

}

.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.avatar{

width:34px;
height:34px;
border-radius:50%;

}

.bubble{

max-width:65%;
padding:12px;
border-radius:14px;
font-size:14px;

}

.user .bubble{

background:rgba(0,0,0,0.25);
border:1px solid #22c55e;
box-shadow:0 0 10px rgba(34,197,94,0.4);

}

.bot .bubble{

background:#111827;
box-shadow:0 0 10px rgba(239,68,68,0.4);

}

/* INPUT */

.input-area{

display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.05);

}

input{

flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;

}

button{

padding:12px 20px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;

}

/* THINKING */

.thinking{

display:flex;
gap:6px;

}

.dot{

width:6px;
height:6px;
background:#ef4444;
border-radius:50%;
animation:bounce 1.2s infinite;

}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{

0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}

}

/* MOBILE */

@media(max-width:900px){

.sidebar{display:none}

}

</style>

</head>

<body>

<div class="particles">

<span style="left:10%"></span>
<span style="left:20%"></span>
<span style="left:30%"></span>
<span style="left:40%"></span>
<span style="left:50%"></span>
<span style="left:60%"></span>
<span style="left:70%"></span>
<span style="left:80%"></span>
<span style="left:90%"></span>

</div>

<div class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div id="history" class="history"></div>

</div>

<div class="main">

<div class="header">
🐱 Siggy · Mystical Oracle Cat
</div>

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

/* CHAT SYSTEM */

let sessions=JSON.parse(localStorage.getItem("siggy_sessions"))||[]

let currentSession=null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")

function save(){

localStorage.setItem("siggy_sessions",JSON.stringify(sessions))

}

function newChat(){

const chat={
id:"chat_"+Date.now(),
title:"New Chat",
messages:[]
}

sessions.push(chat)

currentSession=chat.id

save()

renderSidebar()

messages.innerHTML=""

greeting()

}

function renderSidebar(){

historyDiv.innerHTML=""

sessions.forEach(chat=>{

let div=document.createElement("div")

div.className="history-item"

div.innerText=chat.title

div.onclick=()=>loadSession(chat.id)

historyDiv.appendChild(div)

})

}

function loadSession(id){

currentSession=id

messages.innerHTML=""

let chat=sessions.find(c=>c.id===id)

chat.messages.forEach(m=>{
addMessage(m.text,m.type,false)
})

}

function addMessage(text,type,saveMsg=true){

let div=document.createElement("div")

div.className=`message ${type}`

let html=marked.parse(text)

div.innerHTML=type==="user"
?`<div class="bubble">${html}</div>
<img src="./user-avatar.png" class="avatar">`
:`<img src="./ai-avatar.png" class="avatar">
<div class="bubble">${html}</div>`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

if(saveMsg){

let chat=sessions.find(c=>c.id===currentSession)

chat.messages.push({text,type})

if(chat.messages.length===1){

chat.title=text.substring(0,30)

}

save()

}

}

async function sendMessage(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

let think=showThinking()

try{

let res=await fetch("/api/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})

})

let data=await res.json()

think.remove()

addMessage(data.response||"Siggy is thinking...","bot")

}catch{

think.remove()

addMessage("⚠ Siggy cannot reach the oracle server.","bot")

}

}

document.getElementById("msg").addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

e.preventDefault()

sendMessage()

}

})

function showThinking(){

let div=document.createElement("div")

div.className="message bot"

div.innerHTML=`
<img src="./ai-avatar.png" class="avatar">
<div class="bubble">
<div class="thinking">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`

messages.appendChild(div)

return div

}

function greeting(){

addMessage(`yo traveler 👋  

I'm **Siggy**, the mystical oracle cat of Ritual.

ask me anything.`,"bot")

}

document.addEventListener("DOMContentLoaded",()=>{

renderSidebar()

if(sessions.length===0){

newChat()

}else{

loadSession(sessions[sessions.length-1].id)

}

})

</script>

</body>
</html>
