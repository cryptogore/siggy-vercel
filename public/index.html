<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* ===== BACKGROUND ===== */

.bg{
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background-image:url("./ritual-symbol.png");
background-size:120px;
opacity:0.05;
animation:bgMove 60s linear infinite;
pointer-events:none;
}

@keyframes bgMove{
from{transform:translate(0,0)}
to{transform:translate(-120px,-120px)}
}

/* ===== SIDEBAR ===== */

.sidebar{
width:260px;
background:rgba(2,6,23,0.95);
border-right:1px solid rgba(255,255,255,0.05);
padding:20px;
display:flex;
flex-direction:column;
}

.newchat{
padding:10px;
border-radius:8px;
background:#111827;
cursor:pointer;
margin-bottom:15px;
text-align:center;
}

.newchat:hover{
background:#1f2937;
}

.history{
flex:1;
overflow-y:auto;
}

.history-item{
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
opacity:0.8;
}

.history-item:hover{
background:rgba(255,255,255,0.05);
}

/* ===== MAIN ===== */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* ===== HEADER ===== */

.header{
display:flex;
align-items:center;
gap:10px;
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
width:40px;
}

/* ===== CHAT ===== */

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
display:flex;
gap:10px;
margin:12px 0;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.avatar{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

.bubble{
max-width:65%;
padding:12px 16px;
border-radius:16px;
font-size:14px;
line-height:1.5;
}

.user .bubble{
background:rgba(0,0,0,0.25);
border:1px solid #22c55e;
box-shadow:0 0 10px rgba(34,197,94,0.4);
}

.bot .bubble{
background:#111827;
box-shadow:0 0 10px rgba(239,68,68,0.3);
}

/* ===== INPUT ===== */

.input-area{
display:flex;
gap:10px;
padding:16px;
border-top:1px solid rgba(255,255,255,0.05);
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* ===== THINKING ===== */

.thinking{
display:flex;
gap:6px;
}

.dot{
width:6px;
height:6px;
background:#ef4444;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

/* ===== MOBILE ===== */

@media(max-width:900px){

.sidebar{
display:none;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div id="history" class="history"></div>

</div>

<div class="main">

<div class="header">

<img src="./ritual-logo.png" class="logo">

<strong>Siggy · Mystical Oracle Cat</strong>

</div>

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

let sessions = JSON.parse(localStorage.getItem("siggy_sessions")) || {}

let currentSession = null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")

/* SAVE */

function saveSessions(){

localStorage.setItem(
"siggy_sessions",
JSON.stringify(sessions)
)

}

/* NEW CHAT */

function newChat(){

const id = "chat_" + Date.now()

sessions[id] = []

currentSession = id

saveSessions()

renderSidebar()

messages.innerHTML = ""

greeting()

}

/* ADD MESSAGE */

function addMessage(text,type,save=true){

let div=document.createElement("div")

div.className=`message ${type}`

let avatar = type==="bot"
? "./ai-avatar.png"
: "./user-avatar.png"

let html = marked.parse(text)

if(type==="user"){

div.innerHTML=`
<div class="bubble">${html}</div>
<img src="${avatar}" class="avatar">
`

}else{

div.innerHTML=`
<img src="${avatar}" class="avatar">
<div class="bubble">${html}</div>
`

}

messages.appendChild(div)

messages.scrollTop = messages.scrollHeight

if(save && currentSession){

sessions[currentSession].push({
text:text,
type:type
})

saveSessions()

}

}

/* LOAD SESSION */

function loadSession(id){

currentSession=id

messages.innerHTML=""

sessions[id].forEach(msg=>{
addMessage(msg.text,msg.type,false)
})

}

/* SIDEBAR */

function renderSidebar(){

historyDiv.innerHTML=""

Object.keys(sessions).reverse().forEach(id=>{

let item=document.createElement("div")

item.className="history-item"

let first=sessions[id][0]

item.innerText=first
? first.text.substring(0,30)
: "New Chat"

item.onclick=()=>loadSession(id)

historyDiv.appendChild(item)

})

}

/* THINKING */

function showThinking(){

let div=document.createElement("div")

div.className="message bot"

div.innerHTML=`
<img src="./ai-avatar.png" class="avatar">
<div class="bubble">
<div class="thinking">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`

messages.appendChild(div)

return div

}

/* SEND */

async function sendMessage(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

let thinking=showThinking()

let res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
})

let data=await res.json()

thinking.remove()

addMessage(data.response,"bot")

renderSidebar()

}

/* ENTER SEND */

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter") sendMessage()

})

/* GREETING */

function greeting(){

const greetings=[

`yo traveler 👋  

I'm **Siggy**, the mystical oracle cat of Ritual.

been wandering the network looking for secrets ✨  
ask me anything.`,

`hey there 👀  

I'm **Siggy** — oracle cat and Ritual guide.

what mystery are we exploring today? 🐾`,

`welcome wanderer 🐱  

you've reached **Siggy**, keeper of Ritual knowledge.

ask your question.`

]

addMessage(
greetings[Math.floor(Math.random()*greetings.length)],
"bot"
)

}

/* LOAD PAGE */

window.onload=()=>{

renderSidebar()

if(Object.keys(sessions).length === 0){

newChat()

}else{

let last = Object.keys(sessions).pop()

loadSession(last)

}

}

</script>

</body>

</html>
