<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Dormitory</title>

<link rel="icon" href="./ritual-symbol.png">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background-image:url("./ritual-symbol.png");
background-size:120px;
opacity:0.05;
animation:bgMove 60s linear infinite;
pointer-events:none;
}

@keyframes bgMove{
from{transform:translate(0,0)}
to{transform:translate(-120px,-120px)}
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid rgba(255,255,255,0.05);
padding:15px;
display:flex;
flex-direction:column;
}

.newchat{
background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center;
}

.history{
flex:1;
overflow-y:auto;
}

.history-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.history-item:hover{
background:#111827;
}

.menu-btn{
opacity:.6;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* CHAT */

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
display:flex;
gap:10px;
margin:12px 0;
}

.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.avatar{
width:36px;
height:36px;
border-radius:50%;
}

.bubble{
max-width:65%;
padding:12px 16px;
border-radius:16px;
font-size:14px;
line-height:1.5;
}

/* USER */

.user .bubble{
background:rgba(0,0,0,0.25);
border:1px solid #22c55e;
box-shadow:0 0 8px rgba(34,197,94,.4);
}

/* AI */

.bot .bubble{
background:#111827;
box-shadow:0 0 8px rgba(239,68,68,.4);
}

/* INPUT */

.input-area{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.05);
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* THINKING */

.thinking{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
background:#ef4444;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

/* MENU POPUP */

.popup{
position:absolute;
background:#111827;
border-radius:8px;
padding:5px;
display:none;
flex-direction:column;
}

.popup div{
padding:8px 12px;
cursor:pointer;
}

.popup div:hover{
background:#1f2937;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div id="history" class="history"></div>

</div>

<div class="main">

<div class="header">

<strong>🐱 Siggy · Mystical Oracle Cat</strong>

</div>

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<div id="popup" class="popup"></div>

<script>

let sessions = JSON.parse(localStorage.getItem("siggy_sessions")) || []

let currentSession=null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")
const popup=document.getElementById("popup")

function save(){

localStorage.setItem(
"siggy_sessions",
JSON.stringify(sessions)
)

}

/* NEW CHAT */

function newChat(){

const chat={
id:"chat_"+Date.now(),
title:"New Chat",
messages:[],
pinned:false,
archived:false
}

sessions.push(chat)

currentSession=chat.id

save()

renderSidebar()

messages.innerHTML=""

greeting()

}

/* SIDEBAR */

function renderSidebar(){

historyDiv.innerHTML=""

sessions
.filter(c=>!c.archived)
.sort((a,b)=>b.pinned-a.pinned)

.forEach(chat=>{

let item=document.createElement("div")

item.className="history-item"

item.innerHTML=`
<span>${chat.pinned?"📌 ":""}${chat.title}</span>
<span class="menu-btn">⋯</span>
`

item.onclick=()=>loadSession(chat.id)

item.querySelector(".menu-btn").onclick=(e)=>{

e.stopPropagation()

openMenu(e.pageX,e.pageY,chat.id)

}

historyDiv.appendChild(item)

})

}

/* LOAD */

function loadSession(id){

currentSession=id

messages.innerHTML=""

let chat=sessions.find(c=>c.id===id)

chat.messages.forEach(m=>{
addMessage(m.text,m.type,false)
})

}

/* MESSAGE */

function addMessage(text,type,saveMsg=true){

let div=document.createElement("div")

div.className=`message ${type}`

let avatar=type==="bot"
?"./ai-avatar.png"
:"./user-avatar.png"

div.innerHTML=type==="user"
?`<div class="bubble">${marked.parse(text)}</div>
<img src="${avatar}" class="avatar">`
:`<img src="${avatar}" class="avatar">
<div class="bubble">${marked.parse(text)}</div>`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

if(saveMsg){

let chat=sessions.find(c=>c.id===currentSession)

chat.messages.push({text,type})

if(chat.messages.length===1){
chat.title=text.substring(0,30)
}

save()

}

}

/* SEND */

async function sendMessage(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

let think=showThinking()

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

think.remove()

addMessage(data.response,"bot")

renderSidebar()

}

/* THINKING */

function showThinking(){

let div=document.createElement("div")

div.className="message bot"

div.innerHTML=`
<img src="./ai-avatar.png" class="avatar">
<div class="bubble">
<div class="thinking">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`

messages.appendChild(div)

return div

}

/* MENU */

function openMenu(x,y,id){

popup.style.left=x+"px"
popup.style.top=y+"px"

popup.innerHTML=`
<div onclick="renameChat('${id}')">Rename</div>
<div onclick="pinChat('${id}')">Pin</div>
<div onclick="archiveChat('${id}')">Archive</div>
<div onclick="deleteChat('${id}')">Delete</div>
`

popup.style.display="flex"

}

document.body.onclick=()=>popup.style.display="none"

/* ACTIONS */

function renameChat(id){

let name=prompt("New name")

if(!name) return

sessions.find(c=>c.id===id).title=name

save()

renderSidebar()

}

function pinChat(id){

let chat=sessions.find(c=>c.id===id)

chat.pinned=!chat.pinned

save()

renderSidebar()

}

function archiveChat(id){

sessions.find(c=>c.id===id).archived=true

save()

renderSidebar()

}

function deleteChat(id){

sessions=sessions.filter(c=>c.id!==id)

save()

renderSidebar()

messages.innerHTML=""

}

/* GREETING */

function greeting(){

addMessage(`yo traveler 👋  

I'm **Siggy**, the mystical oracle cat of Ritual.

ask me anything.`,"bot")

}

/* LOAD */

window.onload=()=>{

renderSidebar()

if(sessions.length===0){

newChat()

}else{

loadSession(sessions[sessions.length-1].id)

}

}

</script>

</body>
</html>
