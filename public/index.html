<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Dormitory</title>
<link rel="icon" type="image/png" href="./ritual-symbol.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* GRID */

body::before{

content:"";

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);

background-size:60px 60px;

animation:gridMove 20s linear infinite;

z-index:-5;

}

@keyframes gridMove{
0%{background-position:0 0}
100%{background-position:60px 60px}
}

/* SIDEBAR */

.sidebar{

width:260px;
background:#020617;
border-right:1px solid rgba(255,255,255,0.05);

padding:15px;
display:flex;
flex-direction:column;

z-index:10;

}

.newchat{

background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center;

}

.history{

flex:1;
overflow-y:auto;

}

.history-item{

display:flex;
justify-content:space-between;
align-items:center;

padding:10px;
border-radius:8px;
cursor:pointer;

}

.history-item:hover{
background:#111827;
}

.menu-btn{
cursor:pointer;
padding:4px 8px;
}

/* CONTEXT MENU */

.context-menu{

position:fixed;
background:#111827;
border-radius:8px;
display:none;
flex-direction:column;
min-width:150px;

z-index:999;

}

.context-menu div{

padding:10px;
cursor:pointer;

}

.context-menu div:hover{
background:#1f2937;
}

/* MAIN */

.main{

flex:1;
display:flex;
flex-direction:column;
position:relative;

}

/* SYMBOL */

.symbol-container{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

pointer-events:none;

z-index:0;

}

.symbol{

width:380px;

opacity:0.1;

animation:
rotateSymbol 80s linear infinite,
floatSymbol 10s ease-in-out infinite;

}

@keyframes rotateSymbol{

0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}

}

@keyframes floatSymbol{

0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}

}

/* HEADER */

.header{

padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);

z-index:5;

}

/* CHAT */

.messages{

flex:1;
overflow-y:auto;
padding:20px;

z-index:5;

}

.message{

display:flex;
gap:10px;
margin:10px 0;

}

.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.avatar{

width:34px;
height:34px;
border-radius:50%;

}

.bubble{

max-width:65%;
padding:12px;
border-radius:14px;
font-size:14px;

}

.user .bubble{

background:rgba(0,0,0,0.25);
border:1px solid #22c55e;

}

.bot .bubble{

background:#111827;

}

/* INPUT */

.input-area{

display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.05);

z-index:5;

}

input{

flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;

}

button{

padding:12px 20px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;

}

/* THINKING */

.thinking{
display:flex;
gap:6px;
}

.dot{
width:6px;
height:6px;
background:#ef4444;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

</style>

</head>

<body>

<div class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div id="history" class="history"></div>

</div>

<div class="main">

<div class="symbol-container">

<img src="./ritual-symbol.png" class="symbol">

</div>

<div class="header">
🐱 Siggy · Mystical Oracle Cat
</div>

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<div id="menu" class="context-menu"></div>

<script>

/* STORAGE */

let sessions=JSON.parse(localStorage.getItem("siggy_sessions"))||[]

let currentSession=null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")

function save(){
localStorage.setItem("siggy_sessions",JSON.stringify(sessions))
}

/* GREETINGS */

const greetings=[

"welcome wanderer ✨ the Ritual ecosystem is vast — lucky for you, Siggy knows the shortcuts.",

"psst... hey explorer 🐾 Siggy here, oracle of Ritual.",

"yo traveler 👋 I'm Siggy — mystical oracle cat of Ritual."

]

function randomGreeting(){
return greetings[Math.floor(Math.random()*greetings.length)]
}

/* SIDEBAR */

function renderSidebar(){

historyDiv.innerHTML=""

sessions
.filter(c=>!c.archived)
.sort((a,b)=>b.pinned-a.pinned)

.forEach(chat=>{

let div=document.createElement("div")

div.className="history-item"

div.innerHTML=`
<span class="chat-title">${chat.pinned?"📌 ":""}${chat.title}</span>
<span class="menu-btn">⋯</span>
`

div.querySelector(".chat-title").onclick=()=>loadSession(chat.id)

div.querySelector(".menu-btn").onclick=(e)=>{
e.stopPropagation()
openMenu(e,chat.id)
}

historyDiv.appendChild(div)

})

}

/* MENU */

function openMenu(e,id){

const menu=document.getElementById("menu")

menu.style.display="flex"
menu.style.left=e.pageX+"px"
menu.style.top=e.pageY+"px"

menu.innerHTML=`

<div onclick="renameChat('${id}')">Rename</div>
<div onclick="pinChat('${id}')">Pin</div>
<div onclick="archiveChat('${id}')">Archive</div>
<div onclick="deleteChat('${id}')">Delete</div>

`

}

/* ACTIONS */

function renameChat(id){

let name=prompt("Rename chat")

if(!name)return

sessions.find(c=>c.id===id).title=name

save()
renderSidebar()

}

function pinChat(id){

let chat=sessions.find(c=>c.id===id)

chat.pinned=!chat.pinned

save()
renderSidebar()

}

function archiveChat(id){

sessions.find(c=>c.id===id).archived=true

save()
renderSidebar()

}

function deleteChat(id){

sessions=sessions.filter(c=>c.id!==id)

save()
renderSidebar()

}

/* CLOSE MENU */

document.body.onclick=()=>{
document.getElementById("menu").style.display="none"
}

/* NEW CHAT */

function newChat(){

const chat={
id:"chat_"+Date.now(),
title:"New Chat",
messages:[],
pinned:false,
archived:false
}

sessions.push(chat)

currentSession=chat.id

save()
renderSidebar()

messages.innerHTML=""

addMessage(randomGreeting(),"bot")

}

/* LOAD */

function loadSession(id){

currentSession=id

messages.innerHTML=""

let chat=sessions.find(c=>c.id===id)

chat.messages.forEach(m=>{
addMessage(m.text,m.type,false)
})

}

/* MESSAGE */

function addMessage(text,type,saveMsg=true){

let div=document.createElement("div")

div.className=`message ${type}`

div.innerHTML=type==="user"
? `<div class="bubble">${text}</div>`
: `<div class="bubble">${text}</div>`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

/* SEND */

function sendMessage(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

}

document.getElementById("msg").addEventListener("keydown",(e)=>{

if(e.key==="Enter"){
e.preventDefault()
sendMessage()
}

})

/* INIT */

document.addEventListener("DOMContentLoaded",()=>{

renderSidebar()

if(sessions.length===0){
newChat()
}else{
loadSession(sessions[sessions.length-1].id)
}

})

</script>

</body>
</html>
