<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siggy Dormitory</title>

<link rel="icon" href="./ritual-symbol.png">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* ===== GRID BACKGROUND ===== */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);

background-size:60px 60px;
animation:gridMove 20s linear infinite;

z-index:-5;
}

@keyframes gridMove{
0%{background-position:0 0}
100%{background-position:60px 60px}
}

/* ===== SIDEBAR ===== */

.sidebar{

width:260px;
background:#020617;

border-right:1px solid rgba(255,255,255,0.05);

padding:15px;

display:flex;
flex-direction:column;

transition:0.3s;

}

.newchat{

background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center;

}

.history{
flex:1;
overflow-y:auto;
}

.history-item{

display:flex;
justify-content:space-between;
padding:10px;
border-radius:8px;
cursor:pointer;

}

.history-item:hover{
background:#111827;
}

/* ===== MAIN ===== */

.main{

flex:1;
display:flex;
flex-direction:column;
position:relative;

}

/* ===== SYMBOL ===== */

.symbol-container{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

opacity:.12;
pointer-events:none;

}

.symbol{

width:360px;

animation:spin 80s linear infinite;

}

@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

/* ===== HEADER ===== */

.header{

padding:15px;

border-bottom:1px solid rgba(255,255,255,0.05);

display:flex;
align-items:center;
gap:10px;

}

/* ===== CHAT ===== */

.messages{

flex:1;
overflow-y:auto;

padding:20px;

}

.message{

display:flex;
gap:10px;
margin:10px 0;

}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
}

.bubble{

max-width:70%;
padding:12px;
border-radius:14px;

font-size:14px;

}

.user .bubble{

background:rgba(0,0,0,0.25);
border:1px solid #22c55e;

}

.bot .bubble{

background:#111827;

}

/* ===== INPUT ===== */

.input-area{

display:flex;
gap:10px;

padding:15px;

border-top:1px solid rgba(255,255,255,0.05);

}

input{

flex:1;

padding:12px;

border-radius:8px;

border:none;

background:#1e293b;

color:white;

}

button{

padding:12px 20px;

border:none;

border-radius:8px;

background:#ef4444;

color:white;

cursor:pointer;

}

/* ===== MOBILE ===== */

.mobile-header{
display:none;
}

/* ===== MOBILE BREAKPOINT ===== */

@media (max-width:768px){

.sidebar{

position:fixed;

top:0;
left:-260px;

height:100vh;

z-index:999;

}

.sidebar.open{
left:0;
}

.mobile-header{

display:flex;

align-items:center;
gap:10px;

padding:12px;

border-bottom:1px solid rgba(255,255,255,0.05);

}

.menu-button{
font-size:22px;
cursor:pointer;
}

.symbol{
width:220px;
}

.messages{
padding:15px;
}

.bubble{
max-width:85%;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar" class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div id="history" class="history"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="mobile-header">

<div class="menu-button" onclick="toggleSidebar()">☰</div>

<div>🐱 Siggy</div>

</div>

<div class="symbol-container">

<img src="./ritual-symbol.png" class="symbol">

</div>

<div class="header">

🐱 Siggy · Mystical Oracle Cat

</div>

<div id="messages" class="messages"></div>

<div class="input-area">

<input id="msg" placeholder="Ask Siggy something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

/* SIDEBAR TOGGLE */

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("open")

}

/* GREETINGS */

const greetings=[

"yo traveler 👋 I'm Siggy — mystical oracle cat of Ritual.",

"psst... hey explorer 🐾 Siggy here.",

"welcome wanderer ✨ Ritual world is wide.",

"hey there stranger 😼 ready for some arcane knowledge?",

"ah another curious soul 🔮 what do you seek?"

]

function randomGreeting(){

return greetings[Math.floor(Math.random()*greetings.length)]

}

/* STATE */

let sessions=JSON.parse(localStorage.getItem("siggy_sessions"))||[]

let currentSession=null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")

function save(){

localStorage.setItem("siggy_sessions",JSON.stringify(sessions))

}

/* SIDEBAR */

function renderSidebar(){

historyDiv.innerHTML=""

sessions.forEach(chat=>{

let div=document.createElement("div")

div.className="history-item"

div.innerHTML=`<span>${chat.title}</span>`

div.onclick=()=>loadSession(chat.id)

historyDiv.appendChild(div)

})

}

/* NEW CHAT */

function newChat(){

const chat={

id:"chat_"+Date.now(),
title:"New Chat",
messages:[]

}

sessions.push(chat)

currentSession=chat.id

save()

renderSidebar()

messages.innerHTML=""

addMessage(randomGreeting(),"bot")

}

/* LOAD CHAT */

function loadSession(id){

currentSession=id

messages.innerHTML=""

let chat=sessions.find(c=>c.id===id)

if(!chat)return

chat.messages.forEach(m=>addMessage(m.text,m.type,false))

}

/* MESSAGE */

function addMessage(text,type,saveMsg=true){

let div=document.createElement("div")

div.className=`message ${type}`

div.innerHTML=type==="user"

? `<div class="bubble">${text}</div>
<img src="./user-avatar.png" class="avatar">`

: `<img src="./ai-avatar.png" class="avatar">
<div class="bubble">${marked.parse(text)}</div>`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

if(saveMsg){

let chat=sessions.find(c=>c.id===currentSession)

chat.messages.push({text,type})

if(chat.messages.length===1){
chat.title=text.substring(0,30)
}

save()

}

}

/* SEND MESSAGE */

async function sendMessage(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

let res=await fetch("/api/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message:text})

})

let data=await res.json()

addMessage(data.response||"Siggy is thinking...","bot")

}

/* ENTER SEND */

document.getElementById("msg").addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

e.preventDefault()

sendMessage()

}

})

/* INIT */

document.addEventListener("DOMContentLoaded",()=>{

renderSidebar()

if(sessions.length===0){

newChat()

}else{

loadSession(sessions[sessions.length-1].id)

}

})

</script>

</body>
</html>
