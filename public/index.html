<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy Dormitory</title>
<link rel="icon" type="image/png" href="./ritual-symbol.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#020617;color:white;height:100vh;display:flex;overflow:hidden}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.sidebar{width:260px;background:#020617;border-right:1px solid rgba(255,255,255,.05);padding:15px;display:flex;flex-direction:column;z-index:5}
.newchat{background:#111827;padding:10px;border-radius:8px;cursor:pointer;margin-bottom:10px;text-align:center}
.history{flex:1;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;position:relative}
.symbol-container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:2}
.symbol{width:320px;animation:spin 60s linear infinite;filter:drop-shadow(0 0 20px cyan)}
@keyframes spin{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
.portal-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:420px;height:420px;border-radius:50%;box-shadow:0 0 40px cyan,0 0 80px #00ffff66 inset;animation:ringPulse 4s infinite}
@keyframes ringPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05)}}
.header{padding:15px;border-bottom:1px solid rgba(255,255,255,.05);z-index:3}
.messages{flex:1;overflow-y:auto;padding:20px;z-index:3}
.message{display:flex;gap:10px;margin:10px 0}
.user{justify-content:flex-end}
.bot{justify-content:flex-start}
.avatar{width:32px;height:32px;border-radius:50%}
.bubble{max-width:65%;padding:12px;border-radius:14px;font-size:14px}
.user .bubble{background:rgba(0,0,0,.25);border:1px solid #22c55e}
.bot .bubble{background:#111827}
.input-area{display:flex;gap:10px;padding:15px;border-top:1px solid rgba(255,255,255,.05);z-index:3}
input{flex:1;padding:12px;border-radius:8px;border:none;background:#1e293b;color:white}
button{padding:12px 20px;border:none;border-radius:8px;background:#ef4444;color:white;cursor:pointer}
</style>
</head>
<body>

<div class="sidebar">
<div class="newchat" onclick="newChat()">+ New Chat</div>
<div id="history" class="history"></div>
</div>

<div class="main">

<canvas id="vortex"></canvas>

<div class="symbol-container">
<div class="portal-ring"></div>
<img src="./ritual-symbol.png" class="symbol">
</div>

<div class="header">🐱 Siggy · Mystical Oracle Cat</div>
<div id="messages" class="messages"></div>

<div class="input-area">
<input id="msg" placeholder="Ask Siggy something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
const canvas=document.getElementById('vortex')
const ctx=canvas.getContext('2d')
let w,h

function resize(){
w=canvas.width=window.innerWidth
h=canvas.height=window.innerHeight
}
window.onresize=resize
resize()

const particles=[]
const count=220

for(let i=0;i<count;i++){
particles.push({
angle:Math.random()*Math.PI*2,
radius:80+Math.random()*200,
speed:0.002+Math.random()*0.004,
size:1+Math.random()*2
})
}

function draw(){
ctx.clearRect(0,0,w,h)

let cx=w/2
let cy=h/2

particles.forEach(p=>{

p.angle+=p.speed

let x=cx+Math.cos(p.angle)*p.radius
let y=cy+Math.sin(p.angle)*p.radius

ctx.beginPath()
ctx.arc(x,y,p.size,0,Math.PI*2)
ctx.fillStyle='rgba(0,255,255,0.8)'
ctx.fill()

p.radius-=0.05

if(p.radius<60){
p.radius=200+Math.random()*120
}

})

requestAnimationFrame(draw)
}

draw()
</script>

</body>
</html>
