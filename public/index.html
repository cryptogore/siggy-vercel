<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy Dormitory</title>
<link rel="icon" type="image/png" href="./ritual-symbol.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
height:100vh;
display:flex;
overflow:hidden
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
background-size:60px 60px;
animation:gridMove 20s linear infinite;
z-index:-5
}

@keyframes gridMove{
0%{background-position:0 0}
100%{background-position:60px 60px}
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#020617;
border-right:1px solid rgba(255,255,255,0.05);
padding:15px;
display:flex;
flex-direction:column
}

.newchat{
background:#111827;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
text-align:center
}

.history{
flex:1;
overflow-y:auto
}

.history-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px
}

.history-item:hover{background:#111827}

.menu-btn{cursor:pointer;padding:0 6px}

.archive-toggle{
margin-top:8px;
font-size:13px;
opacity:.7;
cursor:pointer
}

.archive-list{display:none}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
position:relative
}

.symbol-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
opacity:.12
}

.symbol{
width:380px;
animation:spin 80s linear infinite
}

@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

.header{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05)
}

.messages{
flex:1;
overflow-y:auto;
padding:20px
}

.message{
display:flex;
gap:10px;
margin:10px 0
}

.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.avatar{
width:32px;
height:32px;
border-radius:50%
}

.bubble{
max-width:65%;
padding:12px;
border-radius:14px;
font-size:14px
}

.user .bubble{
background:rgba(0,0,0,0.25);
border:1px solid #22c55e
}

.bot .bubble{background:#111827}

.input-area{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.05)
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer
}

.context-menu{
position:fixed;
background:#111827;
border-radius:8px;
display:none;
flex-direction:column;
min-width:150px;
z-index:999
}

.context-menu div{
padding:10px;
cursor:pointer
}

.context-menu div:hover{background:#1f2937}

</style>
</head>

<body>

<div class="sidebar">

<div class="newchat" onclick="newChat()">+ New Chat</div>

<div id="history" class="history"></div>

<div class="archive-toggle" onclick="toggleArchive()">Archived Chats</div>
<div id="archive" class="archive-list"></div>

</div>

<div class="main">

<div class="symbol-container">
<img src="./ritual-symbol.png" class="symbol">
</div>

<div class="header">🐱 Siggy · Mystical Oracle Cat</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="msg" placeholder="Ask Siggy something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<div id="menu" class="context-menu"></div>

<script>

/* GREETINGS */

const greetings=[
"yo traveler 👋 I'm Siggy — mystical oracle cat of Ritual.",
"psst... hey explorer 🐾 Siggy here.",
"welcome wanderer ✨ Ritual world is wide.",
"hey there stranger 😼 ready for some arcane knowledge?",
"ah another curious soul 🔮 what do you seek?",
"well well... someone opened the portal again.",
"hi human 👋 Siggy online. what's the vibe today?",
"yo 👀 Siggy here — guide through the Ritual universe.",
"heya ✨ what's cooking in your brain today?",
"sup traveler 🐱 ready to explore Ritual?"
]

function randomGreeting(){
return greetings[Math.floor(Math.random()*greetings.length)]
}

/* STATE */

let sessions=JSON.parse(localStorage.getItem("siggy_sessions"))||[]
let currentSession=null

const messages=document.getElementById("messages")
const historyDiv=document.getElementById("history")
const archiveDiv=document.getElementById("archive")

function save(){
localStorage.setItem("siggy_sessions",JSON.stringify(sessions))
}

/* FAST CHAT CACHE */

const chatCache=new Map()

/* SIDEBAR RENDER */

function renderSidebar(){

historyDiv.innerHTML=""
archiveDiv.innerHTML=""

const active=sessions.filter(c=>!c.archived)
.sort((a,b)=>b.pinned-a.pinned)

active.forEach(chat=>createItem(chat,historyDiv))

sessions.filter(c=>c.archived).forEach(chat=>createItem(chat,archiveDiv))

}

function createItem(chat,container){

let div=document.createElement("div")
div.className="history-item"

div.innerHTML=`
<span class="chat-title">${chat.pinned?"📌 ":""}${chat.title}</span>
<span class="menu-btn">⋯</span>`

/* instant switching */

div.querySelector(".chat-title").onclick=(e)=>{
e.stopPropagation()
loadSession(chat.id)
}

/* context menu */

div.querySelector(".menu-btn").onclick=(e)=>{
e.stopPropagation()
openMenu(e,chat.id)
}

container.appendChild(div)

}

/* CONTEXT MENU */

function openMenu(e,id){

const menu=document.getElementById("menu")

menu.style.display="flex"
menu.style.left=e.pageX+"px"
menu.style.top=e.pageY+"px"

menu.innerHTML=`
<div onclick="renameChat('${id}')">Rename</div>
<div onclick="pinChat('${id}')">Pin</div>
<div onclick="archiveChat('${id}')">Archive</div>
<div onclick="deleteChat('${id}')">Delete</div>`

}

function renameChat(id){
let name=prompt("Rename chat")
if(!name)return
sessions.find(c=>c.id===id).title=name
save()
renderSidebar()
}

function pinChat(id){
let chat=sessions.find(c=>c.id===id)
chat.pinned=!chat.pinned
save()
renderSidebar()
}

function archiveChat(id){
sessions.find(c=>c.id===id).archived=true
save()
renderSidebar()
}

function deleteChat(id){

sessions=sessions.filter(c=>c.id!==id)

if(currentSession===id){
if(sessions.length){
loadSession(sessions[sessions.length-1].id)
}else{
newChat()
}
}

save()
renderSidebar()

}

function toggleArchive(){
archiveDiv.style.display=
archiveDiv.style.display==="block"?"none":"block"
}

/* NEW CHAT */

function newChat(){

const chat={
id:"chat_"+Date.now(),
title:"New Chat",
messages:[],
pinned:false,
archived:false
}

sessions.push(chat)
currentSession=chat.id

save()
renderSidebar()

messages.innerHTML=""

addMessage(randomGreeting(),"bot")

}

/* LOAD CHAT (instant switching) */

function loadSession(id){

currentSession=id

messages.innerHTML=""

let chat=sessions.find(c=>c.id===id)
if(!chat)return

chat.messages.forEach(m=>addMessage(m.text,m.type,false))

}

/* MESSAGE */

function addMessage(text,type,saveMsg=true){

let div=document.createElement("div")

div.className=`message ${type}`


div.innerHTML=type==="user"
? `<div class="bubble">${text}</div>
<img src="./user-avatar.png" class="avatar">`
: `<img src="./ai-avatar.png" class="avatar">
<div class="bubble">${marked.parse(text)}</div>`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

if(saveMsg){

let chat=sessions.find(c=>c.id===currentSession)

chat.messages.push({text,type})

if(chat.messages.length===1){
chat.title=text.substring(0,30)
}

save()

}

}

/* SEND MESSAGE */

async function sendMessage(){

let input=document.getElementById("msg")
let text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

try{

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

addMessage(data.response||"Siggy is thinking...","bot")

}catch{
addMessage("⚠ Siggy cannot reach the oracle server.","bot")
}

}

/* ENTER SEND */

document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault()
sendMessage()
}
})

/* INIT */

document.addEventListener("DOMContentLoaded",()=>{

renderSidebar()

if(sessions.length===0){
newChat()
}else{
loadSession(sessions[sessions.length-1].id)
}

})

/* CLOSE MENU */

document.body.onclick=()=>{
document.getElementById("menu").style.display="none"
}

</script>

</body>
</html>
